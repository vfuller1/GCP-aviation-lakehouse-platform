name: "Pipeline — Build, Push & Deploy"
# Triggered when ingest code, K8s manifests, or this workflow file change.
# Builds the Kubernetes ingest container, pushes to Artifact Registry,
# and applies the K8s manifests to the GKE Autopilot cluster.
#
# Prerequisites (GitHub Secrets required):
#   GCP_SA_KEY       — service account JSON with roles:
#                        artifactregistry.writer, container.developer
#   GCP_PROJECT_ID   — gcp-lakehouseproject
#   GKE_CLUSTER_NAME — aviation-pipeline
#   GKE_REGION       — us-central1

on:
  push:
    branches: [ main ]
    paths:
      - "pipeline/**"
      - "k8s/**"
      - "retrieval_service/**"
      - ".github/workflows/pipeline.yml"
  workflow_dispatch:
    inputs:
      run_ingest_now:
        description: "Run a one-time ingest job immediately after deploy"
        required: false
        default: false
        type: boolean

env:
  PROJECT_ID:    ${{ secrets.GCP_PROJECT_ID }}
  REGION:        us-central1
  REGISTRY:      us-central1-docker.pkg.dev
  REPO:          aviation-pipeline
  IMAGE:         ingest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------
      # GCP auth
      # -----------------------------------------------------------------
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # -----------------------------------------------------------------
      # Docker — build & push ingest image to Artifact Registry
      # -----------------------------------------------------------------
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build ingest image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:latest \
            pipeline/ingest/

      - name: Push ingest image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:latest

      # -----------------------------------------------------------------
      # Docker — build & push retrieval service image to Artifact Registry
      # -----------------------------------------------------------------
      - name: Build retrieval service image
        if: contains(github.event.head_commit.modified, 'retrieval_service/') || github.event_name == 'workflow_dispatch'
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/retrieval:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/retrieval:latest \
            retrieval_service/

      - name: Push retrieval service image
        if: contains(github.event.head_commit.modified, 'retrieval_service/') || github.event_name == 'workflow_dispatch'
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/retrieval:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/retrieval:latest
      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location:     ${{ env.REGION }}
          project_id:   ${{ secrets.GCP_PROJECT_ID }}

      - name: Apply K8s manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/service-account.yaml
          kubectl apply -f k8s/ingest-cronjob.yaml

      - name: Update CronJob image to new SHA
        run: |
          kubectl set image cronjob/aviation-ingest \
            ingest=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }} \
            -n aviation-pipeline

      - name: Run one-time ingest job now
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.run_ingest_now) }}
        run: |
          # Wait for IAM propagation before triggering the ingest job.
          # IAM bindings can take up to 60s to become effective on GKE workload identity.
          echo "Waiting 90s for IAM propagation..."
          sleep 90
          JOB_NAME="aviation-ingest-manual-${GITHUB_RUN_ID}"
          kubectl delete job "$JOB_NAME" -n aviation-pipeline --ignore-not-found
          kubectl create job --from=cronjob/aviation-ingest "$JOB_NAME" -n aviation-pipeline
            echo "Waiting for job ${JOB_NAME} to complete..."
            for i in $(seq 1 60); do
              STATUS=$(kubectl get job "$JOB_NAME" -n aviation-pipeline -o jsonpath='{.status.conditions[0].type}' 2>/dev/null || echo "")
              if [ "$STATUS" = "Complete" ] || [ "$STATUS" = "SuccessCriteriaMet" ]; then
                echo "Job completed successfully."
                kubectl logs job/"$JOB_NAME" -n aviation-pipeline || true
                break
              elif [ "$STATUS" = "Failed" ]; then
                echo "Job failed. Pod logs:"
                kubectl logs job/"$JOB_NAME" -n aviation-pipeline || true
                exit 1
              fi
              echo "  [${i}/60] status=${STATUS:-Pending} — sleeping 10s..."
              sleep 10
            done
            if [ "$STATUS" != "Complete" ] && [ "$STATUS" != "SuccessCriteriaMet" ]; then
              echo "Job did not complete within 10 minutes. Logs:"
              kubectl logs job/"$JOB_NAME" -n aviation-pipeline || true
              exit 1
            fi

      - name: Run Databricks pipeline jobs (Bronze→Silver→Gold→Export)
        env:
          DBX_HOST: ${{ secrets.DATABRICKS_HOST }}
          DBX_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${DBX_HOST:-}" ] || [ -z "${DBX_TOKEN:-}" ]; then
            echo "DATABRICKS_HOST and/or DATABRICKS_TOKEN not set; skipping Databricks job orchestration."
            exit 0
          fi

          DBX_USER=$(curl -sS -H "Authorization: Bearer ${DBX_TOKEN}" \
            "${DBX_HOST}/api/2.0/preview/scim/v2/Me" | jq -r '.userName // .emails[0].value // empty')
          if [ -z "${DBX_USER}" ]; then
            echo "Unable to determine Databricks user from SCIM /Me."
            exit 1
          fi
          WORKSPACE_NOTEBOOK_DIR="/Users/${DBX_USER}/aviation-pipeline"

          ensure_workspace_dir() {
            RESP=$(jq -n --arg path "$WORKSPACE_NOTEBOOK_DIR" '{path: $path}')
            MKDIRS_RESP=$(curl -sS -X POST -H "Authorization: Bearer ${DBX_TOKEN}" \
              -H "Content-Type: application/json" \
              "${DBX_HOST}/api/2.0/workspace/mkdirs" \
              -d "$RESP")
            if [ -n "${MKDIRS_RESP}" ] && [ "$(echo "$MKDIRS_RESP" | jq -r '.error_code // empty')" != "" ]; then
              echo "Failed to ensure workspace directory ${WORKSPACE_NOTEBOOK_DIR}"
              echo "$MKDIRS_RESP"
              exit 1
            fi
          }

          sync_workspace_notebook() {
            local local_file="$1"
            local workspace_path="$2"
            local b64_content
            local import_payload
            local import_resp

            if [ ! -f "$local_file" ]; then
              echo "Local notebook file missing: $local_file"
              exit 1
            fi

            b64_content=$(base64 -w 0 "$local_file")
            import_payload=$(jq -n \
              --arg path "$workspace_path" \
              --arg content "$b64_content" \
              '{
                path: $path,
                format: "AUTO",
                overwrite: true,
                content: $content
              }')

            import_resp=$(curl -sS -X POST -H "Authorization: Bearer ${DBX_TOKEN}" \
              -H "Content-Type: application/json" \
              "${DBX_HOST}/api/2.0/workspace/import" \
              -d "$import_payload")

            if [ -n "${import_resp}" ] && [ "$(echo "$import_resp" | jq -r '.error_code // empty')" != "" ]; then
              echo "Failed to import notebook ${local_file} -> ${workspace_path}"
              echo "$import_resp"
              exit 1
            fi
          }

          ensure_workspace_dir
          sync_workspace_notebook "databricks_notebooks/bronze_to_silver.py" "${WORKSPACE_NOTEBOOK_DIR}/bronze_to_silver.py"
          sync_workspace_notebook "databricks_notebooks/silver_to_gold.py" "${WORKSPACE_NOTEBOOK_DIR}/silver_to_gold.py"
          sync_workspace_notebook "databricks_notebooks/export_tables_to_gcs.py" "${WORKSPACE_NOTEBOOK_DIR}/export_tables_to_gcs.py"

          wait_for_run() {
            local run_id="$1"
            local last_life=""
            local last_result=""
            while true; do
              RESP=$(curl -sS -H "Authorization: Bearer ${DBX_TOKEN}" \
                "${DBX_HOST}/api/2.1/jobs/runs/get?run_id=${run_id}")

              LIFE=$(echo "$RESP" | jq -r '.state.life_cycle_state')
              RESULT=$(echo "$RESP" | jq -r '.state.result_state // ""')
              if [ "$LIFE" != "$last_life" ] || [ "$RESULT" != "$last_result" ]; then
                echo "run_id=${run_id} state=${LIFE} result=${RESULT}"
                last_life="$LIFE"
                last_result="$RESULT"
              fi

              if [ "$LIFE" = "TERMINATED" ]; then
                if [ "$RESULT" = "SUCCESS" ]; then
                  return 0
                fi
                echo "Databricks run failed:"
                echo "$RESP"
                return 1
              fi

              if [ "$LIFE" = "INTERNAL_ERROR" ] || [ "$LIFE" = "SKIPPED" ]; then
                echo "Databricks run ended unexpectedly:"
                echo "$RESP"
                return 1
              fi

              sleep 15
            done
          }

          workspace_path_exists() {
            local candidate="$1"
            RESP=$(curl -sS -G -H "Authorization: Bearer ${DBX_TOKEN}" \
              --data-urlencode "path=${candidate}" \
              "${DBX_HOST}/api/2.0/workspace/get-status")
            OBJ_TYPE=$(echo "$RESP" | jq -r '.object_type // empty')
            [ -n "$OBJ_TYPE" ]
          }

          resolve_notebook_path() {
            local requested_path="$1"
            local base_name="${requested_path##*/}"
            local base_name_py="$base_name"

            if [[ "$base_name_py" != *.py ]]; then
              base_name_py="${base_name_py}.py"
            fi

            for candidate in \
              "$requested_path" \
              "${requested_path}.py" \
              "${WORKSPACE_NOTEBOOK_DIR}/${base_name}" \
              "${WORKSPACE_NOTEBOOK_DIR}/${base_name_py}"
            do
              if [ -n "$candidate" ] && workspace_path_exists "$candidate"; then
                echo "$candidate"
                return 0
              fi
            done

            echo "$requested_path"
            return 1
          }

          submit_notebook_run() {
            local run_name="$1"
            local task_key="$2"
            local notebook_path="$3"
            local resolved_path
            local obj_type
            local task_json
            local payload_json

            resolved_path=$(resolve_notebook_path "$notebook_path") || {
              echo "Unable to resolve notebook path for ${run_name}. Checked around ${notebook_path}."
              return 1
            }

            obj_type=$(curl -sS -G -H "Authorization: Bearer ${DBX_TOKEN}" \
              --data-urlencode "path=${resolved_path}" \
              "${DBX_HOST}/api/2.0/workspace/get-status" | jq -r '.object_type // empty')

            if [ "$obj_type" = "NOTEBOOK" ]; then
              task_json=$(jq -n --arg tk "$task_key" --arg np "$resolved_path" \
                '{task_key: $tk, notebook_task: {notebook_path: $np}}')

              payload_json=$(jq -n \
                --arg run_name "$run_name" \
                --argjson task "$task_json" \
                '{
                  run_name: $run_name,
                  performance_target: "PERFORMANCE_OPTIMIZED",
                  tasks: [$task]
                }')
            else
              task_json=$(jq -n --arg tk "$task_key" --arg pf "$resolved_path" \
                '{
                  task_key: $tk,
                  environment_key: "default_python",
                  spark_python_task: {
                    python_file: $pf,
                    source: "WORKSPACE"
                  }
                }')

              payload_json=$(jq -n \
                --arg run_name "$run_name" \
                --argjson task "$task_json" \
                '{
                  run_name: $run_name,
                  performance_target: "PERFORMANCE_OPTIMIZED",
                  environments: [
                    {
                      environment_key: "default_python",
                      spec: {
                        environment_version: "4"
                      }
                    }
                  ],
                  tasks: [$task]
                }')
            fi

            echo "Submitting one-off run for ${run_name}"
            RESP=$(curl -sS -X POST -H "Authorization: Bearer ${DBX_TOKEN}" \
              -H "Content-Type: application/json" \
              "${DBX_HOST}/api/2.1/jobs/runs/submit" \
              -d "$payload_json")

            RUN_ID=$(echo "$RESP" | jq -r '.run_id')

            if [ -z "${RUN_ID}" ] || [ "${RUN_ID}" = "null" ]; then
              echo "Failed to submit run: ${run_name}"
              echo "$RESP"
              return 1
            fi

            wait_for_run "${RUN_ID}"
          }

          run_job_by_name() {
            local job_name="$1"
            local task_key="$2"
            local notebook_path="$3"

            JOB_ID=$(curl -sS -H "Authorization: Bearer ${DBX_TOKEN}" \
              "${DBX_HOST}/api/2.1/jobs/list?name=${job_name}" | jq -r '.jobs[0].job_id')

            if [ -z "${JOB_ID}" ] || [ "${JOB_ID}" = "null" ]; then
              echo "Job not found: ${job_name}; using one-off run."
              submit_notebook_run "$job_name" "$task_key" "$notebook_path"
              return 0
            fi

            echo "Triggering ${job_name} (job_id=${JOB_ID})"
            RUN_ID=$(curl -sS -X POST -H "Authorization: Bearer ${DBX_TOKEN}" \
              -H "Content-Type: application/json" \
              "${DBX_HOST}/api/2.1/jobs/run-now" \
              -d "{\"job_id\": ${JOB_ID}}" | jq -r '.run_id')

            if [ -z "${RUN_ID}" ] || [ "${RUN_ID}" = "null" ]; then
              echo "Failed to start job: ${job_name}"
              return 1
            fi

            wait_for_run "${RUN_ID}"
          }

          run_job_by_name "aviation-bronze-to-silver" \
            "bronze_to_silver" \
            "/aviation-pipeline/bronze_to_silver"
          run_job_by_name "aviation-silver-to-gold" \
            "silver_to_gold" \
            "/aviation-pipeline/silver_to_gold"
          run_job_by_name "aviation-export-tables-to-gcs" \
            "export_tables_to_gcs" \
            "/aviation-pipeline/export_tables_to_gcs"

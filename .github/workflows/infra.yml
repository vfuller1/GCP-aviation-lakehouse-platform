name: "Infra — Terraform Apply"

on:
  push:
    branches: [ main ]
    paths:
      - "**.tf"
      - ".terraform.lock.hcl"
      - ".github/workflows/infra.yml"
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-key.json
      TF_VAR_databricks_host:         ${{ secrets.DATABRICKS_HOST }}
      TF_VAR_databricks_token:        ${{ secrets.DATABRICKS_TOKEN }}
      TF_VAR_databricks_account_id:   ${{ secrets.DATABRICKS_ACCOUNT_ID }}
      TF_VAR_enable_gke:              "true"
      TF_VAR_enable_vertex_ai:        "false"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Enable prerequisite GCP APIs
        run: |
          gcloud services enable \
            cloudresourcemanager.googleapis.com \
            iam.googleapis.com \
            container.googleapis.com \
            artifactregistry.googleapis.com \
            aiplatform.googleapis.com \
            --project=${{ secrets.GCP_PROJECT_ID }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -input=false

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -input=false -auto-approve

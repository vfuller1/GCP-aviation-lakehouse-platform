name: "Infra — Terraform Apply"

on:
  push:
    branches: [ main ]
    paths:
      - "**.tf"
      - ".terraform.lock.hcl"
      - ".github/workflows/infra.yml"
  workflow_dispatch:

concurrency:
  group: infra-terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-key.json
      TF_VAR_databricks_host:         ${{ secrets.DATABRICKS_HOST }}
      TF_VAR_databricks_token:        ${{ secrets.DATABRICKS_TOKEN }}
      TF_VAR_databricks_account_id:   ${{ secrets.DATABRICKS_ACCOUNT_ID }}
      TF_VAR_enable_gke:              "true"
      TF_VAR_enable_vertex_ai:        "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Enable prerequisite GCP APIs
        run: |
          gcloud services enable \
            cloudresourcemanager.googleapis.com \
            iam.googleapis.com \
            container.googleapis.com \
            artifactregistry.googleapis.com \
            aiplatform.googleapis.com \
            firestore.googleapis.com \
            run.googleapis.com \
            --project=${{ secrets.GCP_PROJECT_ID }}

      - name: Terraform Init
        run: |
          # -upgrade re-resolves providers fresh against current constraints,
          # bypassing any stale lock file restored from git.
          # Exit non-zero if all retries fail so the step is properly marked failed.
          success=false
          for attempt in 1 2 3; do
            if terraform init -upgrade; then
              success=true
              break
            fi
            echo "terraform init attempt ${attempt} failed; retrying in 15s..."
            sleep 15
          done
          if [ "$success" != "true" ]; then
            echo "All terraform init attempts failed."
            exit 1
          fi

      - name: Terraform Plan
        run: terraform plan -lock-timeout=15m -input=false

      - name: Wait for retrieval image tag
        if: github.ref == 'refs/heads/main'
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REGION: us-central1
          REPOSITORY: aviation-pipeline
          IMAGE: retrieval
        run: |
          set -euo pipefail

          IMAGE_PATH="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE}"
          echo "Waiting for image tag ${IMAGE_PATH}:latest to exist..."

          for i in $(seq 1 30); do
            if gcloud artifacts docker tags list "$IMAGE_PATH" --format='value(tag)' 2>/dev/null | grep -qx "latest"; then
              echo "Found ${IMAGE_PATH}:latest"
              exit 0
            fi
            echo "  [${i}/30] ${IMAGE_PATH}:latest not found yet; sleeping 10s..."
            sleep 10
          done

          echo "Timed out waiting for ${IMAGE_PATH}:latest"
          exit 1

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -lock-timeout=15m -input=false -auto-approve

      - name: Force Cloud Run revision with latest image
        if: github.ref == 'refs/heads/main'
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REGION: us-central1
        run: |
          set -euo pipefail
          IMAGE="us-central1-docker.pkg.dev/${PROJECT_ID}/aviation-pipeline/retrieval:latest"
          echo "Forcing new Cloud Run revision with image: $IMAGE"
          gcloud run deploy aviation-retrieval \
            --image "$IMAGE" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --no-traffic \
            2>&1 || true
          # Migrate traffic to the new revision
          gcloud run services update-traffic aviation-retrieval \
            --to-latest \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            2>&1 || true
          echo "Cloud Run revision updated."

      - name: Verify AI BigQuery Objects
        if: github.ref == 'refs/heads/main'
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail

          DATASET="aviation_analytics"
          OBJECTS=(
            "ai_delay_explanations_v"
            "ai_route_risk_v"
            "ai_nl_analytics_facts_v"
            "ai_rag_documents"
          )

          for obj in "${OBJECTS[@]}"; do
            echo "Checking ${PROJECT_ID}:${DATASET}.${obj}"
            if bq show --format=prettyjson "${PROJECT_ID}:${DATASET}.${obj}" > /dev/null 2>&1; then
              echo "FOUND ${obj}"
            else
              echo "MISSING ${obj}"
              exit 1
            fi
          done

      - name: Verify Cloud Run Retrieval Service
        if: github.ref == 'refs/heads/main'
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail

          SERVICE_NAME="aviation-retrieval"
          REGION="us-central1"

          echo "Checking Cloud Run service: ${SERVICE_NAME}"
          if gcloud run services describe "$SERVICE_NAME" --region="$REGION" --project="$PROJECT_ID" > /dev/null 2>&1; then
            echo "FOUND Cloud Run service ${SERVICE_NAME}"
            SERVICE_URL=$(gcloud run services describe "$SERVICE_NAME" --region="$REGION" --project="$PROJECT_ID" --format='value(status.url)')
            echo "Service URL: $SERVICE_URL"
          else
            echo "Cloud Run service ${SERVICE_NAME} not found (enable_vertex_ai may be false)"
          fi

      - name: Report Vector Search Status
        if: github.ref == 'refs/heads/main'
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REGION: us-central1
        run: |
          set -euo pipefail

          echo "Checking Vertex AI Vector Search index status..."
          INDEX_NAME=$(gcloud ai indexes list \
            --project="$PROJECT_ID" \
            --region="$REGION" \
            --filter='displayName=aviation-rag-index' \
            --format='value(name)' \
            | head -n 1 || true)

          if [ -z "$INDEX_NAME" ]; then
            echo "Vector Search index aviation-rag-index not found yet."
            exit 0
          fi

          echo "Index resource: $INDEX_NAME"
          gcloud ai indexes describe "$INDEX_NAME" \
            --project="$PROJECT_ID" \
            --region="$REGION" \
            --format='table(displayName,indexStats.vectorsCount,metadata.contentsDeltaUri,updateTime)'

          echo "Checking Vector Search endpoint status..."
          ENDPOINT_NAME=$(gcloud ai index-endpoints list \
            --project="$PROJECT_ID" \
            --region="$REGION" \
            --filter='displayName=aviation-rag-endpoint' \
            --format='value(name)' \
            | head -n 1 || true)

          if [ -z "$ENDPOINT_NAME" ]; then
            echo "Vector Search endpoint aviation-rag-endpoint not found yet."
            exit 0
          fi

          echo "Endpoint resource: $ENDPOINT_NAME"
          gcloud ai index-endpoints describe "$ENDPOINT_NAME" \
            --project="$PROJECT_ID" \
            --region="$REGION" \
            --format='table(displayName,publicEndpointEnabled,updateTime)'

      - name: Run E2E Retrieval Service Smoke Tests
        if: github.ref == 'refs/heads/main'
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail

          SERVICE_NAME="aviation-retrieval"
          REGION="us-central1"

          # Get service URL
          SERVICE_URL=$(gcloud run services describe "$SERVICE_NAME" --region="$REGION" --project="$PROJECT_ID" --format='value(status.url)' 2>/dev/null || echo "")

          if [ -z "$SERVICE_URL" ]; then
            echo "⚠ Cloud Run service URL not available; skipping smoke tests"
            exit 0
          fi

          echo "Running smoke tests against: $SERVICE_URL"
          
          # Install dependencies
          pip install --quiet requests

          # Run smoke tests
          python3 tests/test_retrieval_e2e.py "$SERVICE_URL" --timeout 45
